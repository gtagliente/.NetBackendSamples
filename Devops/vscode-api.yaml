apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vscode-api
  template:
    metadata:
      labels:
        app: vscode-api
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: vscode-api
        image: ghcr.io/gtagliente/vscode-api:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: vscode-config
          mountPath: /app/appsettings.json
          subPath: appsettings.json
      volumes:
      - name: vscode-config
        configMap:
          name: vscode-api-settings
---
apiVersion: v1
kind: Service
metadata:
  name: vscode-api-service
spec:
  type: NodePort
  selector:
    app: vscode-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
