apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vscode-api
  template:
    metadata:
      labels:
        app: vscode-api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vscode-api
              topologyKey: kubernetes.io/hostname
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: vscode-api
        image: ghcr.io/gtagliente/vscode-api:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: vscode-config
          mountPath: /app/appsettings.json
          subPath: appsettings.json
      nodeSelector:
        role: worker
      volumes:
      - name: vscode-config
        configMap:
          name: vscode-api-settings
---
apiVersion: v1
kind: Service
metadata:
  name: vscode-api-service
spec:
  type: NodePort
  selector:
    app: vscode-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
