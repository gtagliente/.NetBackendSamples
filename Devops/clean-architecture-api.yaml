apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-architecture-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clean-architecture-api
  template:
    metadata:
      labels:
        app: clean-architecture-api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - clean-architecture-api
              topologyKey: kubernetes.io/hostname
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: clean-architecture-api
        image: ghcr.io/gtagliente/clean-architecture-api:latest
        ports:
        - containerPort: 443
        - containerPort: 80
        env:
        - name: ASPNETCORE_URLS
          value: "https://+:443;http://+:80"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Path
          value: "/https/aspnetapp.pfx"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Password
          valueFrom:
            secretKeyRef:
              name: aspnet-cert-password
              key: cert-password
        volumeMounts:
        - name: aspnet-cert
          mountPath: /https
          readOnly: true
      nodeSelector:
        role: worker
      volumes:
      - name: aspnet-cert
        secret:
          secretName: aspnet-cert
---
apiVersion: v1
kind: Service
metadata:
  name: clean-architecture-api-service
spec:
  type: NodePort
  selector:
    app: clean-architecture-api
  ports:
     - name: https      # 🔹 unique name required
       protocol: TCP
       port: 443
       targetPort: 443
       nodePort: 30443
     - name: http       # 🔹 unique name required
       protocol: TCP
       port: 80
       targetPort: 80
       nodePort: 30080
  type: NodePort
