apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-architecture-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clean-architecture-api
  template:
    metadata:
      labels:
        app: clean-architecture-api
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: clean-architecture-api
        image: ghcr.io/gtagliente/clean-architecture-api:latest
        ports:
        - containerPort: 443
        - containerPort: 80
        env:
        - name: ASPNETCORE_URLS
          value: "https://+:443;http://+:80"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Path
          value: "/https/aspnetapp.pfx"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Password
          value: "myCrtPW2025."
        volumeMounts:
        - name: aspnet-cert
          mountPath: /https
          readOnly: true
      volumes:
      - name: aspnet-cert
        secret:
          secretName: aspnet-cert
---
apiVersion: v1
kind: Service
metadata:
  name: clean-architecture-api-service
spec:
  type: NodePort
  selector:
    app: clean-architecture-api
  ports:
     - name: https      # 🔹 unique name required
       protocol: TCP
       port: 443
       targetPort: 443
       nodePort: 30443
     - name: http       # 🔹 unique name required
       protocol: TCP
       port: 80
       targetPort: 80
       nodePort: 30080
  type: NodePort
